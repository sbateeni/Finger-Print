<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام مطابقة البصمات</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.7.2/font/bootstrap-icons.css" rel="stylesheet">
    <link href="{{ url_for('static', filename='css/style.css') }}" rel="stylesheet">
    <style>
        .preview-area {
            min-height: 200px;
            border: 2px dashed #ccc;
            border-radius: 5px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #f8f9fa;
            transition: all 0.3s ease;
        }
        .preview-area.has-image {
            border-style: solid;
            background-color: white;
        }
        .preview-area img {
            max-height: 300px;
            object-fit: contain;
        }
        img.error {
            width: 100%;
            height: 200px;
            background-color: #f8d7da;
            border: 1px solid #f5c6cb;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #721c24;
            font-size: 14px;
            text-align: center;
        }
        #debugInfo {
            background-color: #f8f9fa;
            border: 1px solid #dee2e6;
            border-radius: 4px;
            padding: 15px;
            margin-bottom: 20px;
        }
        #debugContent {
            white-space: pre-wrap;
            font-family: monospace;
            font-size: 12px;
            max-height: 200px;
            overflow-y: auto;
        }
    </style>
</head>
<body class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand" href="/">
                <i class="bi bi-fingerprint"></i>
                نظام مطابقة البصمات
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item">
                        <a class="nav-link active" href="/">
                            <i class="bi bi-grid-3x3"></i>
                            تقطيع البصمة
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/match">
                            <i class="bi bi-search"></i>
                            مطابقة البصمات
                        </a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-12">
                <div class="card">
                    <div class="card-header">
                        <h4 class="mb-0">تقطيع البصمة إلى مربعات</h4>
                    </div>
                    <div class="card-body">
                        <form id="uploadForm" enctype="multipart/form-data">
                            <div class="mb-4">
                                <label for="fullFingerprint" class="form-label">البصمة المراد تقطيعها</label>
                                <input type="file" class="form-control" id="fullFingerprint" name="fullFingerprint" accept="image/*" required>
                                <div id="fullFingerprintPreview" class="preview-area mt-2">
                                    <div class="text-muted">اختر صورة البصمة أو اسحبها إلى هنا</div>
                                </div>
                            </div>
                            
                            <div id="uploadSuccess" class="alert alert-success d-none">
                                تم تحميل الصورة بنجاح. اضغط على زر "تقطيع البصمة" للمتابعة.
                            </div>

                            <div class="text-center">
                                <button type="submit" class="btn btn-primary">تقطيع البصمة</button>
                            </div>
                        </form>
                    </div>
                </div>

                <!-- منطقة التحميل -->
                <div id="loadingArea" class="text-center mt-4 d-none">
                    <div class="spinner-border text-primary" role="status">
                        <span class="visually-hidden">جاري التحميل...</span>
                    </div>
                    <p class="mt-2">جاري معالجة الصورة...</p>
                </div>

                <!-- منطقة معلومات التصحيح -->
                <div id="debugInfo" class="mt-4 d-none">
                    <h5>معلومات التصحيح:</h5>
                    <pre id="debugContent"></pre>
                </div>

                <!-- منطقة النتائج -->
                <div id="resultsArea" class="mt-4 d-none">
                    <div id="gridsContainer" class="row"></div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{{ url_for('static', filename='js/grid_cutter.js') }}"></script>
</body>
</html>
